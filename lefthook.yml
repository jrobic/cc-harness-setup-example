# Local git hooks (lefthook v2). Installed by `lefthook install`, run automatically
# on `bun install` via the package.json "prepare" script. These enforce the
# conventional commits and quality gates that the CI release (semantic-release)
# depends on. See https://lefthook.dev/configuration/

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - name: dprint
      run: bunx dprint check
    - name: oxlint
      run: bunx oxlint
    # Secret scan on staged content (deep / entropy-based net, complements the
    # regex guard-write-secret hook). Skips cleanly if gitleaks is not installed
    # so contributors without it are not blocked; a real finding still fails.
    - name: gitleaks
      run: if command -v gitleaks >/dev/null 2>&1; then gitleaks protect --staged --redact --no-banner; else echo "gitleaks not installed — skipping staged secret scan (brew install gitleaks)"; fi

pre-push:
  jobs:
    - name: test
      run: bun test
